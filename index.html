<script>
    // Script utama tetap sama seperti versi improved sebelumnya
    // Tambahan: Register Service Worker minimal untuk memenuhi kriteria PWA installable

    // Register dummy Service Worker (minimal fetch event biar dianggap active)
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => {
                self.skipWaiting();
            });
            self.addEventListener('activate', e => {
                e.waitUntil(self.clients.claim());
            });
            self.addEventListener('fetch', e => {
                e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        navigator.serviceWorker.register(url)
            .then(reg => console.log('Service Worker registered (dummy for PWA)', reg))
            .catch(err => console.error('SW registration failed', err));
    }
